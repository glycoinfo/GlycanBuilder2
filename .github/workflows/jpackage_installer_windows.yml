name: Build GlycanBuilder2 and Create Installer (Windows MSIX)

on:
  #push:
  #  branches: [ main , develop ]
  #  tags: [ 'v*' ]
  #pull_request:
  #  branches: [ main ]
  workflow_call:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GITHUB_ACTOR: github.actor
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}_m2_${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}_m2

    - name: Build GlycanBuilder2
      run: mvn clean package -P make-fat-jar -DskipTests
      shell: bash

    - name: Set up application version
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"
      shell: bash

    - name: Create Windows icon
      run: |
        choco install imagemagick -y
        $SMALL = "src\main\resources\icons\icon_small.png"
        $LARGE = "src\main\resources\icons\icon_large.png"
        magick $SMALL -resize 16x16   icon_16.png
        magick $SMALL -resize 24x24   icon_24.png
        magick $SMALL -resize 32x32   icon_32.png
        magick $SMALL -resize 48x48   icon_48.png
        magick $SMALL -resize 64x64   icon_64.png
        magick $LARGE -resize 128x128 icon_128.png
        magick $LARGE -resize 256x256 icon_256.png
        magick icon_16.png icon_24.png icon_32.png icon_48.png icon_64.png icon_128.png icon_256.png glycanbuilder2.ico
      shell: powershell

    - name: Create runtime image with jlink
      run: |
        $JAVA_HOME/bin/jlink \
          --add-modules java.base,java.desktop,java.logging,java.xml,java.prefs,java.datatransfer,java.sql,java.scripting,java.management,java.naming \
          --output runtime-image \
          --strip-debug \
          --compress=2 \
          --no-header-files \
          --no-man-pages
      shell: bash

    - name: Create app-image
      run: |
        & "$env:JAVA_HOME\bin\jpackage.exe" `
          --type app-image `
          --input .\target `
          --name "GlycanBuilder2" `
          --main-jar glycanbuilder2-jar-with-dependencies.jar `
          --main-class org.eurocarbdb.application.glycanbuilder.GlycanBuilder `
          --icon .\glycanbuilder2.ico `
          --dest app-image `
          --runtime-image runtime-image
      shell: powershell

    - name: Create MSIX package
      run: |
        New-Item -ItemType Directory -Force -Path msix-staging\Assets | Out-Null

        Copy-Item -Recurse -Path app-image\GlycanBuilder2 -Destination msix-staging\GlycanBuilder2

        magick src\main\resources\icons\icon_small.png -resize 44x44   msix-staging\Assets\Square44x44Logo.png
        magick src\main\resources\icons\icon_large.png -resize 150x150 msix-staging\Assets\Square150x150Logo.png
        magick src\main\resources\icons\icon_large.png -resize 50x50   msix-staging\Assets\StoreLogo.png

        $parts = "${{ steps.version.outputs.VERSION }}".Split('.')
        while ($parts.Count -lt 4) { $parts += '0' }
        $msixVersion = ($parts[0..3]) -join '.'

        (Get-Content .github\msix\AppxManifest.xml) `
          -replace 'Version="1\.0\.0\.0"', "Version=`"$msixVersion`"" |
          Set-Content msix-staging\AppxManifest.xml

        New-Item -ItemType Directory -Force -Path installers | Out-Null
        $makeappx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
          -Recurse -Filter "makeappx.exe" |
          Where-Object { $_.FullName -like "*x64*" } |
          Select-Object -First 1
        & $makeappx.FullName pack /d msix-staging /p installers\GlycanBuilder2.msix /nv
      shell: powershell

    - name: List created installers
      run: Get-ChildItem installers
      shell: powershell

    - name: Upload installer artifacts
      uses: actions/upload-artifact@v4
      with:
        name: glycanbuilder2-installer-windows
        path: installers/*
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-windows
        path: |
          target/surefire-reports/
        retention-days: 7
