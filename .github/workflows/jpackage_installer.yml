name: Build GlycanBuilder2 and Create Installer

on:
  #push:
  #  branches: [ main , develop ]
  #  tags: [ 'v*' ]
  #pull_request:
  #  branches: [ main ]
  workflow_call:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GITHUB_ACTOR: github.actor
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-15-intel]
        include:
          - os: ubuntu-latest
            platform: linux-debian
            installer-type: deb
            icon-path: ./src/main/resources/icons/icon_large.png
          - os: windows-latest
            platform: windows
            installer-type: msi
            icon-path: .\glycanbuilder2.ico
          - os: macos-latest
            platform: macos
            installer-type: dmg
            icon-path: ./glycanbuilder2.icns
          - os: macos-15-intel
            platform: macos-intel
            installer-type: dmg
            icon-path: ./glycanbuilder2.icns

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}_m2_${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}_m2

    - name: Build GlycanBuilder2
      run: mvn clean package -P make-fat-jar -DskipTests
      shell: bash

    - name: Set up application version
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"
      shell: bash

    - name: Create Windows icon
      if: matrix.os == 'windows-latest'
      run: |
        choco install imagemagick -y
        $SMALL = "src\main\resources\icons\icon_small.png"
        $LARGE = "src\main\resources\icons\icon_large.png"
        magick $SMALL -resize 16x16   icon_16.png
        magick $SMALL -resize 24x24   icon_24.png
        magick $SMALL -resize 32x32   icon_32.png
        magick $SMALL -resize 48x48   icon_48.png
        magick $SMALL -resize 64x64   icon_64.png
        magick $LARGE -resize 128x128 icon_128.png
        magick $LARGE -resize 256x256 icon_256.png
        magick icon_16.png icon_24.png icon_32.png icon_48.png icon_64.png icon_128.png icon_256.png glycanbuilder2.ico
      shell: powershell

    - name: Create macOS icon
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
      run: |
        SMALL=./src/main/resources/icons/icon_small.png
        LARGE=./src/main/resources/icons/icon_large.png
        mkdir -p AppIcon.iconset
        sips -z 16 16     $SMALL --out AppIcon.iconset/icon_16x16.png
        sips -z 32 32     $SMALL --out AppIcon.iconset/icon_16x16@2x.png
        sips -z 32 32     $SMALL --out AppIcon.iconset/icon_32x32.png
        sips -z 64 64     $SMALL --out AppIcon.iconset/icon_32x32@2x.png
        sips -z 128 128   $LARGE --out AppIcon.iconset/icon_128x128.png
        sips -z 256 256   $LARGE --out AppIcon.iconset/icon_128x128@2x.png
        sips -z 256 256   $LARGE --out AppIcon.iconset/icon_256x256.png
        sips -z 512 512   $LARGE --out AppIcon.iconset/icon_256x256@2x.png
        sips -z 512 512   $LARGE --out AppIcon.iconset/icon_512x512.png
        iconutil -c icns AppIcon.iconset -o glycanbuilder2.icns
      shell: bash

    - name: Create runtime image with jlink
      run: |
        $JAVA_HOME/bin/jlink \
          --add-modules java.base,java.desktop,java.logging,java.xml,java.prefs,java.datatransfer,java.sql,java.scripting,java.management,java.naming \
          --output runtime-image \
          --strip-debug \
          --compress=2 \
          --no-header-files \
          --no-man-pages
      shell: bash

    - name: Create installer with jpackage (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        $JAVA_HOME/bin/jpackage \
          --input ./target \
          --name "GlycanBuilder2" \
          --main-jar glycanbuilder2-jar-with-dependencies.jar \
          --main-class org.eurocarbdb.application.glycanbuilder.GlycanBuilder \
          --icon ${{ matrix.icon-path }} \
          --type ${{ matrix.installer-type }} \
          --dest installers \
          --runtime-image runtime-image \
          --app-version ${{ steps.version.outputs.VERSION }} \
          --vendor "The Noguchi Institute - Glycoinformatics Lab." \
          --description "A tool for drawing and editing glycans intuitively" \
          --copyright "Copyright © 2026 The Noguchi Institute" \
          --linux-shortcut \
          --linux-menu-group "Science"

    - name: Create installer with jpackage (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        & "$env:JAVA_HOME\bin\jpackage.exe" `
          --input .\target `
          --name "GlycanBuilder2" `
          --main-jar glycanbuilder2-jar-with-dependencies.jar `
          --main-class org.eurocarbdb.application.glycanbuilder.GlycanBuilder `
          --icon ${{ matrix.icon-path }} `
          --type ${{ matrix.installer-type }} `
          --dest installers `
          --runtime-image runtime-image `
          --app-version ${{ steps.version.outputs.VERSION }} `
          --vendor "The Noguchi Institute - Glycoinformatics Lab." `
          --description "A tool for drawing and editing glycans intuitively" `
          --copyright "Copyright © 2026 The Noguchi Institute" `
          --win-shortcut `
          --win-menu `
          --win-dir-chooser
      shell: powershell

    - name: Create installer with jpackage (macOS)
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
      run: |
        $JAVA_HOME/bin/jpackage \
          --input ./target \
          --name "GlycanBuilder2" \
          --main-jar glycanbuilder2-jar-with-dependencies.jar \
          --main-class org.eurocarbdb.application.glycanbuilder.GlycanBuilder \
          --icon ${{ matrix.icon-path }} \
          --type ${{ matrix.installer-type }} \
          --dest installers \
          --runtime-image runtime-image \
          --app-version ${{ steps.version.outputs.VERSION }} \
          --vendor "The Noguchi Institute - Glycoinformatics Lab." \
          --description "A tool for drawing and editing glycans intuitively" \
          --copyright "Copyright © 2026 The Noguchi Institute" \
          --java-options "-XstartOnFirstThread"

    - name: Rename created installer
      if: matrix.os == 'macos-latest' || matrix.os == 'macos-15-intel'
      run: |
        cd installers
        fname=(*.dmg)
        mv -- "$fname" "${fname%.dmg}.${{ runner.arch }}.dmg"
      shell: bash

    - name: List created installers
      run: |
        ls -la installers/
      shell: bash

    - name: Upload installer artifacts
      uses: actions/upload-artifact@v4
      with:
        name: glycanbuilder2-installer-${{ matrix.platform }}
        path: installers/*
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-${{ matrix.platform }}
        path: |
          target/surefire-reports/
        retention-days: 7
