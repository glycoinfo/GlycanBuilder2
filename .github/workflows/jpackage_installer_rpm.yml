name: Build GlycanBuilder2 and Create Installer (rpm)

on:
  #push:
  #  branches: [ main , develop ]
  #  tags: [ 'v*' ]
  #pull_request:
  #  branches: [ main ]
  workflow_call:

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'zulu'
  GITHUB_ACTOR: github.actor
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-rpm:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - container: almalinux:9
            distro: alma9
          - container: almalinux:10
            distro: alma10

    container:
      image: ${{ matrix.container }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install deps
      run: |
        dnf install -y rpm-build maven

    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: ${{ env.JAVA_DISTRIBUTION }}
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Cache Maven dependencies
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ matrix.distro }}_m2_${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ matrix.distro }}_m2

    - name: Build GlycanBuilder2
      run: mvn clean package -P make-fat-jar -DskipTests
      shell: bash

    - name: Set up application version
      id: version
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/v}
        else
          VERSION="1.0"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "App version: $VERSION"
      shell: bash

    - name: Create runtime image with jlink
      run: |
        $JAVA_HOME/bin/jlink \
          --add-modules java.base,java.desktop,java.logging,java.xml,java.prefs,java.datatransfer,java.sql,java.scripting,java.management,java.naming \
          --output runtime-image \
          --strip-debug \
          --compress=2 \
          --no-header-files \
          --no-man-pages
      shell: bash

    - name: Create installer with jpackage
      run: |
        $JAVA_HOME/bin/jpackage \
          --input ./target \
          --name "GlycanBuilder2" \
          --main-jar glycanbuilder2-jar-with-dependencies.jar \
          --main-class org.eurocarbdb.application.glycanbuilder.GlycanBuilder \
          --icon ./src/main/resources/icons/icon_large.png \
          --type rpm \
          --dest installers \
          --runtime-image runtime-image \
          --app-version ${{ steps.version.outputs.VERSION }} \
          --vendor "The Noguchi Institute - Glycoinformatics Lab." \
          --description "A tool for drawing and editing glycans intuitively" \
          --copyright "Copyright © 2026 The Noguchi Institute" \
          --linux-shortcut \
          --linux-menu-group "Science"

    - name: Rename created installer
      run: |
        cd installers
        fname=(*.x86_64.rpm)
        mv -- "$fname" "${fname%.x86_64.rpm}.${{ matrix.distro }}.x86_64.rpm"
      shell: bash

    - name: List created installers
      run: |
        ls -la installers/
      shell: bash

    - name: Upload installer artifacts
      uses: actions/upload-artifact@v4
      with:
        name: glycanbuilder2-installer-linux-rpm-${{ matrix.distro }}
        path: installers/*
        retention-days: 30

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs-linux-rpm-${{ matrix.distro }}
        path: |
          target/surefire-reports/
        retention-days: 7
